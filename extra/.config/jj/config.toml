#:schema https://docs.jj-vcs.dev/latest/config-schema.json

# [user] is defined in conf.d/user.toml (not managed by dotfiles)

[revsets]
log = "present(@) | (trunk()..@).. | (trunk()..@)- | (trunk()..@)--"

[aliases]
l = ["log", "--limit", "20"]
lt = ["log", "-r", "trunk()::@"] # log trunk
lf = ["log", "-T", "my_log_oneline_full(self)"] # log full-sha
ld = ["log", "-r", "present(@) | ancestors(immutable_heads().., 2) | present(trunk())"] # log default
la = ["log", "-r", "all()"] # log all
info = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
jj check
echo ""
echo "---------- log ----------"
echo ""
jj log --limit 15
echo ""
echo "---------- status ----------"
echo ""
jj st
"""]
bup = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]
bo = ["util", "exec", "--", "bash", "-c", """
set -euxo pipefail
jj bookmark create $@ -r @-
jj bookmark track $@ --remote=origin
""", ""]
check = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
REVSET='trunk()..@'

if [ -z "$(jj diff --name-only -r "$REVSET")" ]; then
  echo "==> No changes in $REVSET. Nothing to scan."
  exit 0
fi

echo "scan target: jj diff -r '$REVSET'"

files=()
while IFS= read -r f; do
  [ -f "$f" ] && files+=("$f")
done < <(jj diff --name-only -r "$REVSET")

if [ ${#files[@]} -eq 0 ]; then
  echo "==> All changes are deletions. Nothing to scan."
  exit 0
fi

echo "==> Running gitleaks..."
for f in "${files[@]}"; do
  gitleaks dir --no-banner --verbose --log-level warn "$f"
done

echo "==> Running git-secrets..."
git-secrets --scan "${files[@]}"

echo '==> All checks passed.'
"""]
n = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
jj check
jj new "$@"
""", ""]
c = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
jj check
jj commit "$@"
""", ""]
s = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
jj check
jj squash "$@"
""", ""]
gp = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
jj check
jj git push "$@"
""", ""]

[ui]
default-command = ["info"]
diff-formatter = ":git"
editor = "hx"

# `hunk` pager は TUI なので、log/status などの非 diff 出力に被せると毎回 q で抜ける
# 必要が出る。diff 系コマンドのときだけスコープして適用する。
[[--scope]]
--when.commands = ["diff", "show", "interdiff"]
[--scope.ui]
pager = ["hunk", "pager"]

[colors]
tags = "cyan"
trunk = { fg = "yellow", bold = true }

[template-aliases]
'my_log_oneline(commit)' = '''
if(commit.root(),
  format_root_commit(commit),
  label(
    separate(" ",
      if(commit.current_working_copy(), "working_copy"),
      if(commit.immutable(), "immutable", "mutable"),
      if(commit.conflict(), "conflicted"),
    ),
    separate(" ",
      format_short_change_id_with_change_offset(commit),
      commit.author().name(),
      commit.bookmarks(),
      commit.tags(),
      commit.working_copies(),
      format_short_commit_id(commit.commit_id()),
      format_commit_labels(commit),
      if(commit.contained_in("trunk()"), label("trunk", "(trunk)")),
      if(config("ui.show-cryptographic-signatures").as_boolean(),
        format_short_cryptographic_signature(commit.signature())
      ),
      if(commit.empty(), label("empty", "(empty)")),
      if(commit.description(),
        commit.description().first_line(),
        label(if(commit.empty(), "empty"), "(no description set)"),
      ),
    ) ++ "\n",
  )
)
'''

'my_log_oneline_full(commit)' = '''
if(commit.root(),
  format_root_commit(commit),
  label(
    separate(" ",
      if(commit.current_working_copy(), "working_copy"),
      if(commit.immutable(), "immutable", "mutable"),
      if(commit.conflict(), "conflicted"),
    ),
    separate(" ",
      format_short_change_id_with_change_offset(commit),
      commit.author().name(),
      commit.bookmarks(),
      commit.tags(),
      commit.working_copies(),
      commit.commit_id(),
      format_commit_labels(commit),
      if(config("ui.show-cryptographic-signatures").as_boolean(),
        format_short_cryptographic_signature(commit.signature())
      ),
      if(commit.empty(), label("empty", "(empty)")),
      if(commit.description(),
        commit.description().first_line(),
        label(if(commit.empty(), "empty"), "(no description set)"),
      ),
    ) ++ "\n",
  )
)
'''

'my_op_log_oneline(op)' = '''
label(if(current_operation, "current_operation"),
  coalesce(
    if(op.root(), format_root_operation(op)),
    separate(" ",
      format_short_operation_id(op.id()),
      format_user_redacted(op.user()),
      op.time().end(),
      op.tags(),
      op.description().first_line(),
    ) ++ "\n",
  )
)
'''

[templates]
log = "my_log_oneline(self)"
op_log = "my_op_log_oneline(self)"
